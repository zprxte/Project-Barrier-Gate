<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสแกนป้ายทะเบียนยานพาหนะ HCU</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="index-page">

    <header class="hcu-header">
    <div class="logo-area">
        <img src="image/logoHCU.png" alt="โลโก้ HCU" class="hcu-logo">
    </div>
    <div class="system-title">ระบบสแกนป้ายทะเบียนยานพาหนะ HCU</div>
</header>

    <!-- DIV ใหม่สำหรับจัดตำแหน่งกล่องไปทางขวา -->
    <div class="login-options-container"> 
        <div class="login-options">
            
            <h2>เลือกประเภทผู้ใช้</h2>
            
            <div class="login-button-row"> <!-- DIV ใหม่สำหรับจัดปุ่มให้อยู่แถวเดียวกัน -->
                <button class="login-button user-button" onclick="goToLoginPage('user_login.html')">
                    <i class="fas fa-user-circle icon"></i>
                    <span>ผู้ใช้ทั่วไป</span>
                </button>

                <button class="login-button admin-button" onclick="goToLoginPage('admin_login.html')">
                    <i class="fas fa-cog icon"></i>
                    <span>Admin</span>
                </button>
            </div>

        </div>
    </div>
    

    <script>
        function goToLoginPage(page) {
            // เมื่อคลิกปุ่ม จะเปลี่ยนไปหน้า Login ที่กำหนด
            window.location.href = page;
        }
    </script>

</body>
</html>
